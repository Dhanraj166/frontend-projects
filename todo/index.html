
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo list</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(at top left, #9d61ba, transparent),
        radial-gradient(at bottom right, #718777, #554f75);
    }

    .todo-box {
      width: 520px;
      background: #ffffff;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 14px 100px rgba(0, 0, 0, 0.25);
    }

    h1 {
      font-weight: 1200;
      text-align: center;
      margin-bottom: 20px;
      background: linear-gradient(135deg, #f97aff 0%, #7afff0 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }

    #inputText {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      outline: none;
      box-shadow: 0 5px 25px rgb(213, 215, 216);
    }

    #inputText:hover {
      box-shadow: 0 5px 25px rgb(137, 187, 222);
    }

    .add-btn {
      padding: 12px 18px;
      border-radius: 8px;
      border: none;
      background: #667eea;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .add-btn:hover {
      background: #5a6fdc;
      box-shadow: 0 5px 25px rgb(137, 187, 222);
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      background: #f3f4f6;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }

    li:hover {
      background: #f9f0f0;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
    }

    li span {
      flex: 1;
      font-size: 15px;
      color: #333;
      word-break: break-word;
    }

    li.done span {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .actions button {
      border: none;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .delete {
      background: rgba(255, 107, 138, 0.12);
      color: #ff6b8a;
    }

    .delete:hover {
      background: #dc2626;
      color: white;
    }
  </style>
</head>

<body>

  <div class="todo-box">
    <h1>Todo List</h1>

    <div class="input-area">
      <input id="inputText" type="text" placeholder="Enter your task" />
      <button class="add-btn" id="btn">Add</button>
    </div>

    <ul id="list"></ul>
  </div>
  <script>
  const inputText = document.getElementById("inputText");
  const btn = document.getElementById("btn");
  const ul = document.getElementById("list");

  let todos = JSON.parse(localStorage.getItem("todos")) || [];

  // save to localStorage
  function saveTodos() {
    localStorage.setItem("todos", JSON.stringify(todos));
  }

  // render todos
  function renderTodos() {
    ul.innerHTML = "";

    todos.forEach((todo, index) => {
      const li = document.createElement("li");
      if (todo.done) li.classList.add("done");

      const span = document.createElement("span");
      span.innerText = todo.text;

      li.addEventListener("click", () => {
        todos[index].done = !todos[index].done;
        saveTodos();
        renderTodos();
      });

      const actions = document.createElement("div");
      actions.className = "actions";

      const delBtn = document.createElement("button");
      delBtn.innerText = "Delete";
      delBtn.className = "delete";

      delBtn.addEventListener("click", () => {
        todos.splice(index, 1);
        saveTodos();
        renderTodos();
      });

      actions.appendChild(delBtn);
      li.appendChild(span);
      li.appendChild(actions);
      ul.appendChild(li);
    });
  }

  // add new todo
  btn.addEventListener("click", () => {
    const value = inputText.value.trim();
    if (value === "") return;

    todos.push({ text: value, done: false });
    saveTodos();
    renderTodos();
    inputText.value = "";
  });

  // load todos on page load
  renderTodos();
</script>



</body>

</html>
