<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />
  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
      font-family: 'poppins';

    }

    .container {
      width: 40%;
      height: 90vh;
      margin: auto;
      border: 1px solid gray;
      margin-top: 5vh;
      background: linear-gradient(180deg, #A855F7 0%, #3B82F6 100%);
      color: #fff;
      text-align: center;
      border-radius: 12px;
      box-shadow: 0 1px 6px rgba(42, 36, 36, 0.91);
    }

    .heading {
      margin: 40px;
      font-size: 48px;
    }

    #btn {
      justify-content: center;
      align-items: center;
      border-radius: 12px;
      border: none;
      padding: 13px 15px 8px 15px;
      margin-left: 20px;
      position: relative;
      top: 4px;
      background-color: white;

    }

    #btn:hover {
      box-shadow: 0 1px 6px rgba(255, 255, 255, 0.91);-
    }

    .search {
      margin-top: 40px;
    }

    #input {
      height: 50px;
      width: 350px;
      font-size: 18px;
      border: none;
      outline: none;
      border-radius: 12px;
      padding: 10px;

    }

    #input:hover {
      box-shadow: 0 1px 6px rgba(255, 255, 255, 0.91);
    }

    .weather {
      margin-top: 40px;
      margin-bottom: 10px;
    }

    .temp {
      font-size: 50px;
      margin-bottom: 40px;
    }

    .city {
      font-size: 40px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1 class="heading">Check weather</h1>
    <div class="search">
      <input type="text" id="input" placeholder=" Enter City Name" autocomplete="off" spellcheck="false">

      <button id="btn"><span class="material-symbols-outlined">search</span></button>
    </div>
    <div class="weather">
      <img src="" id="weather-icon">
      <h1 class="temp" id="temp"></h1>
      <h2 class="city" id="city"></h2>
    </div>
  </div>

  <script>
    const input = document.getElementById("input");
    const btn = document.getElementById("btn");
    const temp = document.getElementById("temp");
    const city = document.getElementById("city");
    const weatherIcon = document.getElementById("weather-icon");

    btn.addEventListener("click", function () {
      const cityName = input.value.trim();

      if (cityName === "") {
        //alert("Please enter a city name");
        city.innerText = "Please enter a city name"
        return;
      }

      fetch(`https://api.openweathermap.org/data/2.5/weather?q=${cityName}&appid=e7ab4e259606ba503278e184ed755d98&units=metric`)

        .then((response) => {
          if (!response.ok) {
            throw new Error("City not found");
          }
          return response.json();
        })
        

        .then((data) => {
          const temperature = Math.round(data.main.temp);

          temp.innerText = temperature + " °C";
          city.innerText = data.name;

          if (temperature > 40) {
            weatherIcon.src = "images/clear.png"
          } else if (temperature >= 30) {
            weatherIcon.src = "images/mist.png";
          } else if (temperature < 30 && temperature >= 0) {
            weatherIcon.src = "images/clouds.png";
          } else {
            weatherIcon.src = "images/snow.png"
          }
        })
        .catch((error) => {
          // alert(error.message);
          city.innerText = (error.message)
        });
    });
  </script>


</body>

</html>
