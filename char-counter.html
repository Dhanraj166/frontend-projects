<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>
   <style>
      body {
         font-family: Arial, sans-serif;
         background-color: #f2f2f2;
      }

      div {
         width: 400px;
         margin: 50px auto;
         background-color: #ffffff;
         padding: 20px;
         border-radius: 8px;
      }

      #textBox {
         width: 100%;
         height: 120px;
         padding: 10px;
         font-size: 16px;
         resize: none;
      }

      #reset{
         margin-top: 20px;
      }
   </style>
</head>

<body>

   <div>
      <h2 id="heading">live character counter</h2>
      <textarea name="" id="textBox" placeholder="Enter text here...."></textarea>
      <button id="reset" type="reset">Reset</button>
      <h3>Characters: <span id="result">0</span> /200 </h3>
   </div>

   <script>
      const textBox = document.getElementById("textBox")
      const result = document.getElementById("result")
      const reset = document.getElementById("reset")
      const maxlength = 200;

      textBox.addEventListener("input", () => {
         const currentlength = textBox.value.length;
         result.textContent = currentlength;
         if (currentlength >= maxlength) {
            result.style.color = "red";
         } else {
            result.style.color = "black";
         }
      })

      reset.addEventListener("click", () => {
         textBox.value = "";
         result.textContent = 0;
         result.style.color = black;

      })
   </script>

</body>

</html>
