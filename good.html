<!DOCTYPE html>
<html>

<head>
  <title>City Dropdown</title>
</head>

<body>

  <div class="container">
    <input type="text" id="cityInput" placeholder="Type city name..." />
    <ul id="dropdown"></ul>
    <button id="btn">Check Weather</button>
    <h1 id="result"></h1>
  </div>

  <script>
    const input = document.getElementById("cityInput");
    const dropdown = document.getElementById("dropdown");
    const btn = document.getElementById("btn");
    const result = document.getElementById("result")

    input.addEventListener("input", async () => {
      const text = input.value.trim();

      if (text.length === 0) {
        dropdown.innerHTML = "";
        return;
      }

      const url = `https://geocoding-api.open-meteo.com/v1/search?name=${text}&count=5&language=en&format=json`;
      const res = await fetch(url);
      const data = await res.json();

      dropdown.innerHTML = "";

      if (!data.results) return;

      data.results.forEach(city => {
        const li = document.createElement("li");
        li.textContent = `${city.name}, ${city.country}`;

        li.onclick = () => {
          input.value = city.name;
          dropdown.innerHTML = "";
        };

        dropdown.appendChild(li);3000
      });
    });
    btn.addEventListener("click", () => {
      const getUser = async () => {
        const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Trichy&appid=e7ab4e259606ba503278e184ed755d98&units=metric`);

        if (!response.ok) {
          throw new Error("URL is Invallid")
        }
        const user = await response.json()
        

      }
      
      result.innerText=`${user.main.temp} C`
    })


    console.log(`the city is: ${input.value}`);

  </script>

</body>

</html>
