<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        div {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 400px;
            gap: 10px;
        }
        
        label {
            font-size: 20px;
        }
        
        #pass {
            width: 300px;
        
        }
        
        #icons {
            cursor: pointer;
        }

        button {
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div>
        <label for="pass">Enter Your Password :</label>
        <input type="password" id="pass">
        <span id="icons" class="material-symbols-outlined" onclick="check()">Visibility_Off</span><br>

    </div>
    <div style="position: relative; bottom: 400px;">
        <button onclick="bg()">Submit</button>
        <button onclick="upper()">Uppercase</button><br>
        <h1 id="container"></h1><br>
        <h2 id="count">Word count :</h2>
    </div>
    
    <script>
        const visible = document.getElementById("pass");
        const icon = document.getElementById("icons")
        function check() {
            if (visible.type === "password") {
                visible.type = "text";
                icon.textContent = "Visibility"
            } else {
                visible.type = "password"
                icon.textContent = "Visibility_Off"
            }
        }
        function bg() {
            if (document.body.style.backgroundColor == "white") {
                document.body.style.backgroundColor = "purple"
            } else {
                document.body.style.backgroundColor = "white"
            }
            // document.body.style.backgroundColor = "yellow"
        }
        function upper() {
            const toUpper = document.getElementById("pass").value;
            const container = document.getElementById("container");
            const count = document.getElementById("count");
            container.innerHTML = toUpper.toUpperCase();
            count.innerHTML = "Word count :" + toUpper.trim().split(/\s+/).filter(word => word.length > 0).length;
            
        }


    </script>


</body>

</html>
