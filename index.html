<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Frontend Projects</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      background: linear-gradient(135deg, #42413b 0%, #5a5448 100%);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 32px;
      color: #ffffff;
    }

    .header p {
      color: #ece1e1;
      margin-top: 8px;
    }

    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #f9f9f9;
      border-radius: 14px;
      padding: 25px;
      text-align: center;
      transition: all 0.3s ease;
      box-shadow: 0 10px 20px rgba(231, 227, 227, 0.08);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.6), transparent);
      transition: 0.5s;
    }

    .card:hover::before {
      left: 100%;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 18px 30px rgba(0,0,0,0.15);
    }

    .icon {
      font-size: 45px;
      margin-bottom: 15px;
    }

    .card h3 {
      font-size: 22px;
      color: #333;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    .card a {
      display: inline-block;
      padding: 10px 22px;
      background: #667eea;
      color: #fff;
      text-decoration: none;
      border-radius: 25px;
      font-size: 14px;
      transition: background 0.3s;
    }

    .card a:hover {
      background: #764ba2;
    }

  </style>
</head>

<body>

  <div class="container">
    <div class="header">
      <h1>My Frontend Projects</h1>
      <p>HTML • CSS • JavaScript Projects</p>
    </div>

    <div class="projects">

      <div class="card">
        
        <h3>Calculator</h3>
        <p>A simple calculator built using HTML, CSS and JavaScript.</p>
        <a href="calculator.html">View Project</a>
      </div>

      <div class="card">
        
        <h3>Weather App</h3>
        <p>Check real-time weather using a public API.</p>
        <a href="weather.html">View Project</a>
      </div>

    </div>

    
  </div>

</body>
</html>
