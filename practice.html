<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>
   
</head>

<body>
   <div>
      <label for="tamil">Enter Tamil Mark :</label>
      <input type="text" id="tamil">
   </div>
   <div>
      <label for="english">Enter English Mark :</label>
      <input type="text" id="english">
   </div>
   <div>
      <label for="maths">Enter Maths Mark :</label>
      <input type="text" id="maths">
   </div>
   <div>
      <label for="science">Enter Science Mark :</label>
      <input type="text" id="science">
   </div>
   <div>
      <label for="socialscience">Enter Socialscience Mark :</label>
      <input type="text" id="socialscience">
   </div>
   <button onclick="calculate()">Result</button>
   <div id="Total"></div>
   <div id="Average"></div>
   <div id="Grade"></div>
   <script>
      function calculate() {
         const tamil = Number(document.getElementById("tamil").value);
         const english = Number(document.getElementById("english").value);
         const maths = Number(document.getElementById("maths").value);
         const science = Number(document.getElementById("science").value);
         const socialscience = Number(document.getElementById("socialscience").value);
         const total = tamil + english + maths + science + socialscience;
         const average = total / 5;
         let grade;
         if (average > 90 && average <= 100) {
            grade = "A+";
         } else if (average > 80) {
            grade = "A";
         } else if (average > 70) {
            grade = "B";
         } else if (average > 60) {
            grade = "C";
         } else if (average > 50) {
            grade = "D";
         } else {
            grade = "No Grade";
         }

         document.getElementById("Total").innerHTML = "Total : " + total;
         document.getElementById("Average").innerHTML = "Average : " + average;
         document.getElementById("Grade").innerHTML = "Grade : " + grade;

      }

   </script>

</body>

</html>
